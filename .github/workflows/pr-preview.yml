name: PR Preview — Netlify Preview Deploy

on:
  pull_request:
    branches: [main]

jobs:
  preview:
    name: Preview Deploy
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy Preview to Netlify
        id: deploy
        run: |
          URL=$(npx netlify deploy --dir=.next --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} --site=${{ secrets.NETLIFY_SITE_ID }} --json 2>&1 | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('deploy_url',''))")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Preview Deploy\n\nDeployed to: ${{ steps.deploy.outputs.url }}\n\n_This preview will be removed when the PR is closed._`
            })
