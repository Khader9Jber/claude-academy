name: PR Preview — Vercel Preview Deploy

on:
  pull_request:
    branches: [main]

jobs:
  preview:
    name: Preview Deploy
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy Preview to Vercel
        id: deploy
        run: |
          URL=$(npx vercel deploy --token=${{ secrets.VERCEL_TOKEN }} --scope claude-academy-org 2>&1 | grep -o 'https://[^ ]*\.vercel\.app' | tail -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Preview Deploy\n\nDeployed to: ${{ steps.deploy.outputs.url }}\n\n_This preview will be removed when the PR is closed._`
            })
